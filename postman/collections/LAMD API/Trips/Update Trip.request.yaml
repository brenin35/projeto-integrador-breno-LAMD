$kind: http-request
name: Update Trip
method: PUT
url: '{{baseUrl}}/trips/:id'
order: 4000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '00000000-0000-0000-0000-000000000000'
body:
  type: json
  content: |-
    {
      "availableSeats": 3,
      "status": "full",
      "notes": "Updated notes"
    }
