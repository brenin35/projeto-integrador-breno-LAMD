$kind: http-request
name: Update User
method: PUT
url: '{{baseUrl}}/users/:id'
order: 4000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '00000000-0000-0000-0000-000000000000'
body:
  type: json
  content: |-
    {
      "name": "John Updated",
      "email": "john@example.com",
      "phone": "11988888888",
      "role": "driver",
      "vehicle": "Toyota Corolla",
      "rating": "4.8"
    }
