$kind: http-request
name: Create User
method: POST
url: '{{baseUrl}}/users'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "phone": "11999999999",
      "role": "passenger",
      "vehicle": null,
      "rating": "5.0"
    }
