name: LAMD API
description: |-
  # LAMD API

  A **LAMD API** é um serviço de backend RESTful que alimenta uma plataforma de caronas compartilhadas. Ela oferece operações completas de CRUD (Criar, Ler, Atualizar, Deletar) para três recursos principais:

  ## Recursos

  ### 👤 Usuários

  Gerencie os usuários da plataforma, incluindo passageiros e motoristas. Cada usuário possui nome, e-mail, telefone, função (role), informações opcionais sobre veículo e uma avaliação (rating).

  ### 🚗 Viagens

  Gerencie as viagens oferecidas pelos motoristas. Uma viagem inclui origem, destino, horário de partida, disponibilidade de assentos, preço por assento e status atual (ex.: `open`). Motoristas podem criar, atualizar e excluir suas viagens.

  ### 🪑 Solicitações de Assento

  Gerencie as solicitações de reserva feitas por passageiros para viagens disponíveis. Uma solicitação vincula um passageiro a uma viagem, especificando a quantidade de assentos desejada e um status (ex.: `pending`, `accepted`, `rejected`).

  ## URL Base

  Todas as requisições utilizam a variável `{{baseUrl}}`. Certifique-se de configurá-la no seu ambiente ativo antes de enviar as requisições.
variables:
  baseUrl: "{{baseUrl}}"
